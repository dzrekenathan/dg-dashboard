services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: clet_db
      POSTGRES_USER: clet
      POSTGRES_PASSWORD: clet_secret
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U clet -d clet_db"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build: .
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      DATABASE_URL: DATABASE_URL=postgresql+asyncpg://postgres.oyrwgfygteferjpziyjx:ePrFcQHJcgImMfa5@aws-0-us-east-2.pooler.supabase.com:5432/postgres?ssl=require
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./app:/app/app

volumes:
  postgres_data:
